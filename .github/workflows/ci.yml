name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-lint.yml@main
    with:
      package-manager: bun
      lint-command: lint

  format:
    name: Format
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-lint.yml@main
    with:
      package-manager: bun
      lint-command: format:check

  typecheck:
    name: Typecheck
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-typecheck.yml@main
    with:
      package-manager: bun

  test:
    name: Test
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-test.yml@main
    with:
      package-manager: bun
      test-command: test:coverage
      coverage: true
      coverage-files: ./coverage/lcov.info
      coverage-flags: unit-tests
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build
    needs: [lint, format, typecheck, test]
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-build.yml@main
    with:
      package-manager: bun
      artifact-name: build-${{ github.sha }}

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [lint, format, typecheck, test, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed"
